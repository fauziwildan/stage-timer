name: Deploy → Hostinger

on:
  push:
    branches: [main]

# Prevent concurrent deploys
concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  build-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Node.js + cache ────────────────────────────────────────────────────
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # ── 3. Install frontend deps ──────────────────────────────────────────────
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      # ── 4. Build React app ────────────────────────────────────────────────────
      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_BASE_URL: https://timemanager.motionharbour.com/backend/api
          VITE_SOCKET_URL: ${{ secrets.VITE_SOCKET_URL }}
        run: npm run build

      # ── 5. Create backend/.env from GitHub Secrets ───────────────────────────
      - name: Create backend .env
        run: |
          printf 'DB_HOST=%s\nDB_PORT=3306\nDB_NAME=%s\nDB_USER=%s\nDB_PASS=%s\n' \
            "${{ secrets.DB_HOST }}" \
            "${{ secrets.DB_NAME }}" \
            "${{ secrets.DB_USER }}" \
            "${{ secrets.DB_PASS }}" \
            > backend/.env

      # ── 6. Deploy frontend → public_html/ ────────────────────────────────────
      - name: Deploy frontend to Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./frontend/dist/
          server-dir: /public_html/
          log-level: standard

      # ── 7. Deploy PHP backend → public_html/backend/ ─────────────────────────
      - name: Deploy PHP backend to Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./backend/
          server-dir: /public_html/backend/
          log-level: standard
          exclude: |
            **/.env.hostinger
            **/node_modules/**
